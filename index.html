<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Machina X Deus — Drum Sequencer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="nav" id="nav">
    <a href="#" class="nav-logo" id="nav-logo">MACHINA x DEUS</a>
    <span class="nav-tag">PERCUSSION SYNTHESIZER</span>
  </nav>

  <section class="hero">

    <div class="sequencer" id="sequencer">

      <div class="seq-tracks">
        <div class="track-row">
          <button class="mute-btn active" data-track="0">KK</button>
        </div>
        <div class="track-row">
          <button class="mute-btn active" data-track="1">SN</button>
        </div>
        <div class="track-row">
          <button class="mute-btn active" data-track="2">HH</button>
        </div>
        <div class="track-row">
          <button class="mute-btn active" data-track="3">PC</button>
        </div>
      </div>

      <div class="seq-grid" id="seq-grid"></div>

      <div class="playhead" id="playhead"></div>

    </div>

    <div class="seq-controls">
      <button class="play-btn" id="play-btn">
        <span class="play-icon" id="play-icon">▶</span>
      </button>
      <div class="bpm-wrap">
        <span class="ctrl-label">BPM</span>
        <input type="range" class="bpm-slider" id="bpm-slider" min="60" max="180" value="120" step="1">
        <span class="bpm-value" id="bpm-value">120</span>
      </div>
      <button class="clear-btn" id="clear-btn">CLEAR</button>
    </div>

  </section>

  <footer class="footer">
    <span class="footer-left">MACHINA X DEUS</span>
    <span class="footer-right">Instruments for chaos.</span>
  </footer>

  <script src="js/sequencer.js"></script>
</body>
</html>
